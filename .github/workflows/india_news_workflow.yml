name: Fetch India News

on:
  schedule:
    - cron: '0 11 * * *'   # 6AM EST (UTC+5 offset: 11:00 UTC)
    - cron: '0 23 * * *'   # 6PM EST (UTC+5 offset: 23:00 UTC)
  workflow_dispatch:        # Allow manual runs

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run news fetcher
        run: |
          python fetch_india_news.py

      - name: Commit and push updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/India_news.json
          git diff --cached --quiet || git commit -m "chore: update India_news.json [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
